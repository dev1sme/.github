name: Reusable Telegram Notify

on:
  workflow_call:
    inputs:
      status:
        required: true
        type: string
        description: "success | failure | cancelled"
      title:
        required: false
        type: string
        default: "CI/CD"
    secrets:
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_CHAT_ID:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Telegram — Thành công
        if: inputs.status == 'success'
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="✅ *${{ inputs.title }} SUCCESS*
Repo: \`${{ github.repository }}\`
Branch: \`${{ github.ref_name }}\`
[Xem run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

      - name: Telegram — Thất bại
        if: inputs.status == 'failure'
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="❌ *${{ inputs.title }} FAILED*
Repo: \`${{ github.repository }}\`
Branch: \`${{ github.ref_name }}\`
[Xem lỗi](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

      - name: Telegram — Cancelled
        if: inputs.status == 'cancelled'
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="⚠️ *${{ inputs.title }} CANCELLED*
Repo: \`${{ github.repository }}\`
Branch: \`${{ github.ref_name }}\`
[Xem run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"